<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chipmunk Messenger</title>
    <!-- Подключаем стили Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Подключаем PeerJS для P2P связи (текст + видео) -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <!-- Подключаем иконки FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        // Настраиваем цвета в стиле Бурундука (оранжево-коричневые акценты)
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        chipmunk: {
                            light: '#f97316', // Оранжевый
                            DEFAULT: '#ea580c', // Темно-оранжевый
                            dark: '#9a3412', // Коричневый
                            bg: '#1c1917', // Темный фон (stone-900)
                            panel: '#292524' // Светлее фона (stone-800)
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Отзеркаливаем свою камеру */
        #local-video { transform: scaleX(-1); }
        /* Плавная прокрутка для чата */
        #chat-history { scroll-behavior: smooth; }
        /* Скрываем скроллбар для красоты */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ea580c; border-radius: 10px; }
    </style>
</head>
<!-- Используем h-[100dvh] для идеальной работы на мобильных телефонах -->
<body class="bg-chipmunk-bg text-gray-100 font-sans h-[100dvh] flex flex-col overflow-hidden selection:bg-chipmunk-light selection:text-white">

    <!-- Всплывающее уведомление (Toast) -->
    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-chipmunk-dark text-white px-6 py-3 rounded-full shadow-2xl z-50 transition-all duration-300 opacity-0 translate-y-[-20px] pointer-events-none flex items-center">
        <i id="toast-icon" class="fas fa-info-circle mr-2"></i>
        <span id="toast-msg" class="font-medium whitespace-nowrap"></span>
    </div>

    <!-- Верхняя панель (Header) -->
    <header class="bg-chipmunk-panel border-b border-stone-700 p-3 sm:p-4 shadow-md flex justify-between items-center z-20 flex-shrink-0">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-chipmunk rounded-xl flex items-center justify-center text-xl shadow-lg shadow-chipmunk/20 flex-shrink-0">
                🐿️
            </div>
            <div class="overflow-hidden">
                <h1 class="text-lg sm:text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-orange-400 to-chipmunk truncate">Chipmunk</h1>
                <p id="connection-status" class="text-xs text-stone-400 flex items-center truncate">
                    <span class="w-2 h-2 rounded-full bg-yellow-500 mr-1 animate-pulse flex-shrink-0"></span> Подключение...
                </p>
            </div>
        </div>
        
        <!-- Кнопки в шапке (появятся при чате) -->
        <div id="header-actions" class="hidden flex space-x-1 sm:space-x-2">
            <!-- Кнопка АУДИО звонка -->
            <button onclick="startCall('audio')" class="bg-stone-700 hover:bg-stone-600 text-white p-2.5 sm:px-4 sm:py-2 rounded-lg transition flex items-center shadow-md" title="Аудиозвонок">
                <i class="fas fa-phone-alt text-green-400"></i> <span class="hidden sm:inline ml-2">Аудио</span>
            </button>
            <!-- Кнопка ВИДЕО звонка -->
            <button onclick="startCall('video')" class="bg-stone-700 hover:bg-stone-600 text-white p-2.5 sm:px-4 sm:py-2 rounded-lg transition flex items-center shadow-md" title="Видеозвонок">
                <i class="fas fa-video text-chipmunk-light"></i> <span class="hidden sm:inline ml-2">Видео</span>
            </button>
            <!-- Выход -->
            <button onclick="disconnectChat()" class="bg-red-500/20 hover:bg-red-500/40 text-red-400 p-2.5 sm:px-4 sm:py-2 rounded-lg transition flex items-center" title="Покинуть чат">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </header>

    <!-- Основной контейнер -->
    <main class="flex-1 relative flex overflow-hidden">
        
        <!-- ЭКРАН 1: Подключение (Лобби) -->
        <div id="screen-connect" class="absolute inset-0 flex flex-col items-center justify-center p-4 z-10 overflow-y-auto">
            <div class="w-full max-w-md space-y-6">
                
                <!-- Карточка моего ID -->
                <div class="bg-chipmunk-panel border border-stone-700 rounded-2xl p-6 shadow-xl">
                    <h2 class="text-lg font-semibold mb-2 text-stone-300 flex items-center">
                        <i class="fas fa-id-badge mr-2 text-chipmunk"></i> Ваш номер (Код)
                    </h2>
                    <div class="flex items-center space-x-2 relative">
                        <input type="text" id="my-id" readonly value="Генерация..." class="flex-1 bg-stone-900 border border-stone-600 rounded-xl px-4 py-3 text-white outline-none font-mono text-lg tracking-widest text-center w-full font-bold">
                        <button onclick="copyId()" class="bg-chipmunk hover:bg-chipmunk-light text-white p-3 rounded-xl transition flex items-center justify-center w-12 h-12 shadow-md">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                    <p class="text-xs text-stone-500 mt-3 text-center">Продиктуйте или отправьте этот 6-значный код другу.</p>
                </div>

                <!-- Карточка подключения к другу -->
                <div class="bg-chipmunk-panel border border-stone-700 rounded-2xl p-6 shadow-xl">
                    <h2 class="text-lg font-semibold mb-2 text-stone-300 flex items-center">
                        <i class="fas fa-user-plus mr-2 text-chipmunk"></i> Подключиться к другу
                    </h2>
                    <div class="flex flex-col space-y-3">
                        <input type="number" id="target-id" placeholder="Введите код друга..." class="w-full bg-stone-900 border border-stone-600 focus:border-chipmunk rounded-xl px-4 py-3 text-white outline-none transition font-mono text-base tracking-widest text-center appearance-none">
                        <button id="btn-connect" onclick="connectToPeer()" class="w-full bg-chipmunk hover:bg-chipmunk-light text-white font-bold py-3 rounded-xl transition flex justify-center items-center shadow-lg shadow-chipmunk/30">
                            <i class="fas fa-paper-plane mr-2"></i> Создать чат
                        </button>
                    </div>
                </div>

            </div>
        </div>

        <!-- ЭКРАН 2: Мессенджер (Чат) -->
        <div id="screen-chat" class="hidden absolute inset-0 flex flex-col z-10 bg-chipmunk-bg">
            
            <!-- Область сообщений -->
            <div id="chat-history" class="flex-1 overflow-y-auto p-4 space-y-4">
                <!-- Системное сообщение -->
                <div class="flex justify-center my-4">
                    <span class="bg-stone-800 text-stone-400 text-[10px] sm:text-xs px-3 py-1 rounded-full border border-stone-700 shadow-sm text-center">
                        Чат защищен шифрованием P2P 🔒
                    </span>
                </div>
            </div>

            <!-- Зона ввода текста -->
            <div class="bg-chipmunk-panel border-t border-stone-700 p-2 sm:p-4 flex-shrink-0">
                <form id="chat-form" onsubmit="sendMessage(event)" class="flex items-end space-x-2 max-w-4xl mx-auto">
                    <!-- text-base (16px) предотвращает зум на iPhone -->
                    <textarea id="chat-input" rows="1" placeholder="Сообщение..." class="flex-1 bg-stone-900 border border-stone-600 focus:border-chipmunk rounded-xl px-4 py-3 text-stone-100 text-base outline-none transition resize-none max-h-32 min-h-[48px]"></textarea>
                    <button type="submit" class="bg-chipmunk hover:bg-chipmunk-light text-white rounded-xl transition flex items-center justify-center w-12 h-12 shadow-md flex-shrink-0">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>

        <!-- ПАНЕЛЬ ЗВОНКА (Поверх чата) -->
        <div id="video-overlay" class="hidden absolute inset-0 sm:inset-auto sm:top-4 sm:right-4 p-4 z-30 pointer-events-none flex items-center justify-center sm:justify-end bg-black/50 sm:bg-transparent backdrop-blur-sm sm:backdrop-blur-none">
            <!-- Контейнер звонка -->
            <div class="pointer-events-auto bg-stone-900 border border-stone-700 p-3 rounded-3xl shadow-2xl flex flex-col w-full max-w-sm sm:w-72 transition-all relative" id="call-container">
                
                <div class="absolute top-4 left-4 z-40">
                    <span id="call-type-badge" class="bg-black/60 text-white text-xs px-2 py-1 rounded-md backdrop-blur-md font-medium">Звонок</span>
                </div>

                <!-- Область Собеседника -->
                <div class="relative w-full aspect-[3/4] bg-black rounded-2xl overflow-hidden mb-3 shadow-inner flex items-center justify-center">
                    
                    <!-- Заглушка для АУДИОЗВОНКА -->
                    <div id="audio-only-remote" class="hidden flex flex-col items-center justify-center w-full h-full bg-stone-800 absolute inset-0 z-10">
                        <div class="w-24 h-24 bg-chipmunk/20 rounded-full flex items-center justify-center mb-4 relative">
                            <div class="absolute inset-0 bg-chipmunk/30 rounded-full animate-ping"></div>
                            <div class="w-20 h-20 bg-chipmunk rounded-full flex items-center justify-center text-5xl shadow-lg z-10 relative">
                                🐿️
                            </div>
                        </div>
                        <span class="text-stone-300 font-medium">Собеседник на линии</span>
                    </div>

                    <!-- Видео собеседника -->
                    <video id="remote-video" autoplay playsinline class="w-full h-full object-cover hidden"></video>
                    
                    <!-- Лоадер ожидания -->
                    <div id="remote-video-loader" class="absolute inset-0 flex flex-col justify-center items-center bg-stone-900/90 z-20">
                        <i class="fas fa-spinner fa-spin text-3xl text-chipmunk mb-3"></i>
                        <span class="text-sm text-stone-300">Соединение...</span>
                    </div>
                </div>

                <!-- Моя область (маленькая камера) -->
                <div id="local-video-wrapper" class="relative w-full h-24 bg-black rounded-xl overflow-hidden mb-3 border border-stone-700">
                    <video id="local-video" autoplay playsinline muted class="w-full h-full object-cover"></video>
                </div>

                <!-- Панель управления звонком -->
                <div class="flex space-x-2">
                    <button onclick="toggleMic()" id="btn-mic" class="flex-1 bg-stone-800 p-3 rounded-xl text-white hover:bg-stone-700 transition">
                        <i class="fas fa-microphone text-lg"></i>
                    </button>
                    <button onclick="toggleVideo()" id="btn-video" class="flex-1 bg-stone-800 p-3 rounded-xl text-white hover:bg-stone-700 transition">
                        <i class="fas fa-video text-lg"></i>
                    </button>
                    <button onclick="endCall()" class="flex-2 bg-red-600 hover:bg-red-500 text-white px-6 py-3 rounded-xl font-bold shadow-lg transition w-full">
                        <i class="fas fa-phone-slash"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- МОДАЛЬНОЕ ОКНО: Входящий звонок -->
        <div id="incoming-call-modal" class="hidden absolute inset-0 bg-black/80 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
            <div class="bg-chipmunk-panel border border-chipmunk rounded-3xl p-6 sm:p-8 shadow-2xl w-full max-w-sm text-center animate-bounce">
                <div class="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-lg shadow-chipmunk/50 relative">
                    <div class="absolute inset-0 bg-chipmunk/50 rounded-full animate-ping"></div>
                    <div id="incoming-call-icon" class="bg-chipmunk w-full h-full rounded-full flex items-center justify-center relative z-10 text-white">
                        <i class="fas fa-phone-alt"></i>
                    </div>
                </div>
                <h2 id="incoming-call-title" class="text-xl sm:text-2xl font-bold text-white mb-2">Входящий звонок!</h2>
                <p class="text-stone-400 text-sm mb-8">Вы сможете выключить микрофон во время разговора.</p>
                <div class="flex space-x-4">
                    <button onclick="answerCall()" class="flex-1 bg-green-500 hover:bg-green-400 text-white font-bold py-4 rounded-2xl transition shadow-lg shadow-green-500/30 text-lg">
                        <i class="fas fa-phone"></i> Принять
                    </button>
                    <button onclick="rejectCall()" class="flex-1 bg-red-500 hover:bg-red-400 text-white font-bold py-4 rounded-2xl transition shadow-lg shadow-red-500/30 text-lg">
                        <i class="fas fa-times"></i> Сброс
                    </button>
                </div>
            </div>
        </div>

    </main>

    <!-- Логика приложения -->
    <script>
        // --- ПЕРЕМЕННЫЕ СОСТОЯНИЯ ---
        let peer = null;            
        let dataConnection = null;  
        let mediaConnection = null; 
        let localStream = null;     
        let incomingCallRef = null; 
        let reconnectTimeout = null;
        
        let micEnabled = true;
        let videoEnabled = true;
        let currentCallType = null; 

        // Секретный префикс
        const APP_PREFIX = 'chipmunk-msg-'; 
        
        // Генерация 6-значного номера
        const generateShortId = () => Math.floor(100000 + Math.random() * 900000).toString();
        let myCustomId = generateShortId();

        const ui = {
            screenConnect: document.getElementById('screen-connect'),
            screenChat: document.getElementById('screen-chat'),
            headerActions: document.getElementById('header-actions'),
            statusText: document.getElementById('connection-status'),
            videoOverlay: document.getElementById('video-overlay'),
            incomingModal: document.getElementById('incoming-call-modal'),
            chatHistory: document.getElementById('chat-history'),
            chatInput: document.getElementById('chat-input')
        };

        function showToast(msg, type = 'info') {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            const icon = document.getElementById('toast-icon');
            icon.className = type === 'error' ? 'fas fa-exclamation-triangle mr-2 text-red-400' : 'fas fa-info-circle mr-2 text-chipmunk-light';
            toast.classList.remove('opacity-0', 'translate-y-[-20px]');
            setTimeout(() => toast.classList.add('opacity-0', 'translate-y-[-20px]'), 3000);
        }

        function setStatus(text, colorClass = 'text-stone-400', isPulse = false) {
            const dot = isPulse ? `<span class="w-2 h-2 rounded-full bg-${colorClass.split('-')[1]}-500 mr-1 animate-pulse flex-shrink-0"></span>` : `<span class="w-2 h-2 rounded-full bg-${colorClass.split('-')[1]}-500 mr-1 flex-shrink-0"></span>`;
            ui.statusText.innerHTML = `${dot} <span class="${colorClass} truncate">${text}</span>`;
        }

        function switchScreen(screen) {
            ui.screenConnect.classList.add('hidden');
            ui.screenChat.classList.add('hidden');
            if(screen === 'chat') {
                ui.screenChat.classList.remove('hidden');
                ui.headerActions.classList.remove('hidden');
            } else {
                ui.screenConnect.classList.remove('hidden');
                ui.headerActions.classList.add('hidden');
            }
        }

        // --- ИНИЦИАЛИЗАЦИЯ ---
        function initApp() {
            if (peer) {
                peer.destroy();
            }

            peer = new Peer(APP_PREFIX + myCustomId, {
                debug: 2,
                pingInterval: 10000, // Снижаем агрессивность пинга для стабильности
                config: {'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun.cloudflare.com:3478' },
                    { urls: 'stun:global.stun.twilio.com:3478' }
                ]}
            });

            peer.on('open', (id) => {
                document.getElementById('my-id').value = myCustomId;
                setStatus('В сети', 'text-green-500', true);
                if (reconnectTimeout) clearTimeout(reconnectTimeout);
            });

            peer.on('disconnected', () => {
                setStatus('Связь потеряна. Ожидание...', 'text-yellow-500', true);
                if (!peer.destroyed) {
                    if (reconnectTimeout) clearTimeout(reconnectTimeout);
                    reconnectTimeout = setTimeout(() => {
                        peer.reconnect();
                    }, 3000);
                }
            });

            peer.on('connection', (conn) => {
                if (dataConnection) {
                    conn.close();
                    return;
                }
                setupChatConnection(conn);
            });

            peer.on('call', (call) => {
                incomingCallRef = call;
                currentCallType = call.metadata?.type || 'video';
                
                const title = document.getElementById('incoming-call-title');
                const icon = document.getElementById('incoming-call-icon');
                
                if (currentCallType === 'audio') {
                    title.innerText = 'Входящий аудиозвонок!';
                    icon.innerHTML = '<i class="fas fa-phone-alt"></i>';
                } else {
                    title.innerText = 'Входящий видеозвонок!';
                    icon.innerHTML = '<i class="fas fa-video"></i>';
                }
                
                ui.incomingModal.classList.remove('hidden');
            });

            peer.on('error', (err) => {
                console.error("PeerJS Ошибка:", err);
                
                // Всегда разблокируем кнопку подключения при любой ошибке
                const btn = document.getElementById('btn-connect');
                if (btn) {
                    btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i> Создать чат';
                    btn.disabled = false;
                }

                if (err.type === 'peer-unavailable') {
                    showToast('Собеседник не в сети (возможно, свернул браузер)', 'error');
                } else if (err.type === 'unavailable-id') {
                    myCustomId = generateShortId();
                    initApp(); 
                } else if (err.type === 'network' || err.type === 'disconnected' || err.type === 'server-error') {
                    setStatus('Сбой сети. Обновление...', 'text-red-400');
                    if (reconnectTimeout) clearTimeout(reconnectTimeout);
                    reconnectTimeout = setTimeout(() => {
                        initApp();
                    }, 4000);
                } else {
                    setStatus('Ошибка: ' + err.type, 'text-red-500');
                }
            });
        }

        // --- ВОССТАНОВЛЕНИЕ ПРИ ВОЗВРАТЕ В БРАУЗЕР ---
        // Когда пользователь сворачивает и разворачивает браузер (Telegram, WhatsApp)
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === 'visible') {
                if (peer && peer.disconnected && !peer.destroyed) {
                    setStatus('Возврат в браузер, переподключение...', 'text-yellow-500', true);
                    peer.reconnect();
                }
            }
        });

        // --- ЛОГИКА ТЕКСТОВОГО ЧАТА ---
        function connectToPeer() {
            const targetId = document.getElementById('target-id').value.trim();
            const myId = document.getElementById('my-id').value;
            
            if (!targetId || targetId.length < 3) return showToast('Введите верный код друга', 'error');
            if (targetId === myId) return showToast('Это ваш собственный код!', 'error');

            const btn = document.getElementById('btn-connect');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Подключение...';
            btn.disabled = true;

            // Убрал reliable: true, так как он часто вызывает зависание на плохом интернете
            const conn = peer.connect(APP_PREFIX + targetId);
            
            conn.on('open', () => {
                setupChatConnection(conn);
            });

            conn.on('error', (err) => {
                showToast('Сбой соединения', 'error');
                btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i> Создать чат';
                btn.disabled = false;
            });
        }

        function setupChatConnection(conn) {
            dataConnection = conn;
            
            dataConnection.on('data', (data) => {
                renderMessage(data.text, 'them');
            });

            dataConnection.on('close', () => {
                showToast('Собеседник покинул чат', 'error');
                disconnectChat();
            });

            setStatus('Чат активен', 'text-chipmunk-light');
            switchScreen('chat');
            
            const cleanPeerId = conn.peer.replace(APP_PREFIX, '');
            
            ui.chatHistory.innerHTML = `
                <div class="flex justify-center my-4">
                    <span class="bg-stone-800 text-stone-400 text-[10px] sm:text-xs px-3 py-1 rounded-full border border-stone-700 shadow-sm text-center">
                        Чат с пользователем ${cleanPeerId} создан 🔒
                    </span>
                </div>
            `;
            showToast('Чат успешно создан!');
        }

        function sendMessage(e) {
            e.preventDefault();
            if (!dataConnection) return;
            
            const text = ui.chatInput.value.trim();
            if (!text) return;

            dataConnection.send({ type: 'text', text: text });
            renderMessage(text, 'me');
            
            ui.chatInput.value = '';
            ui.chatInput.style.height = 'auto';
        }

        function renderMessage(text, sender) {
            const msgDiv = document.createElement('div');
            const isMe = sender === 'me';
            
            msgDiv.className = `flex w-full mb-4 ${isMe ? 'justify-end' : 'justify-start'}`;
            
            const bubble = document.createElement('div');
            bubble.className = `max-w-[85%] sm:max-w-[75%] rounded-2xl px-4 py-2 sm:py-3 shadow-md break-words ${
                isMe 
                ? 'bg-chipmunk text-white rounded-tr-sm' 
                : 'bg-stone-800 text-stone-100 border border-stone-700 rounded-tl-sm'
            }`;
            
            bubble.textContent = text; 
            
            const timeSpan = document.createElement('div');
            timeSpan.className = `text-[10px] mt-1 ${isMe ? 'text-chipmunk-dark text-right' : 'text-stone-500 text-left'}`;
            const d = new Date();
            timeSpan.innerText = `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
            
            bubble.appendChild(timeSpan);
            msgDiv.appendChild(bubble);
            ui.chatHistory.appendChild(msgDiv);
            
            ui.chatHistory.scrollTop = ui.chatHistory.scrollHeight;
        }

        function disconnectChat() {
            if (dataConnection) dataConnection.close();
            if (mediaConnection) endCallLocally();
            dataConnection = null;
            
            document.getElementById('target-id').value = '';
            const btn = document.getElementById('btn-connect');
            if (btn) {
                btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i> Создать чат';
                btn.disabled = false;
            }
            
            setStatus('В сети', 'text-green-500', true);
            switchScreen('connect');
        }

        // --- ЛОГИКА ЗВОНКОВ (АУДИО И ВИДЕО) ---
        async function getMediaAccess(type) {
            try {
                if (localStream) {
                    localStream.getTracks().forEach(t => t.stop());
                }
                
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: type === 'video', 
                    audio: true 
                });
                
                document.getElementById('local-video').srcObject = localStream;
                micEnabled = true;
                videoEnabled = type === 'video';
                updateMediaButtons();
                
                return true;
            } catch (err) {
                console.error("Media error:", err);
                showToast('Разрешите доступ к микрофону/камере в браузере!', 'error');
                return false;
            }
        }

        function setCallUI(type) {
            const isAudio = type === 'audio';
            document.getElementById('call-type-badge').innerHTML = isAudio ? '<i class="fas fa-phone-alt text-green-400 mr-1"></i> Аудиозвонок' : '<i class="fas fa-video text-chipmunk-light mr-1"></i> Видеозвонок';
            
            document.getElementById('audio-only-remote').classList.toggle('hidden', !isAudio);
            
            if (!isAudio) {
                document.getElementById('remote-video').classList.remove('hidden');
            } else {
                document.getElementById('remote-video').classList.add('hidden');
            }
            
            document.getElementById('local-video-wrapper').classList.toggle('hidden', isAudio);
            document.getElementById('btn-video').classList.toggle('hidden', isAudio);
            
            ui.videoOverlay.classList.remove('hidden');
            document.getElementById('remote-video-loader').classList.remove('hidden');
        }

        async function startCall(type) {
            if (!dataConnection) return;
            const targetId = dataConnection.peer; 
            currentCallType = type;

            const hasMedia = await getMediaAccess(type);
            if (!hasMedia) return;

            setCallUI(type);

            const call = peer.call(targetId, localStream, { metadata: { type: type } });
            setupMediaConnection(call);
        }

        async function answerCall() {
            ui.incomingModal.classList.add('hidden');
            
            const hasMedia = await getMediaAccess(currentCallType);
            if (!hasMedia) {
                if (incomingCallRef) incomingCallRef.close();
                return;
            }

            if (incomingCallRef) {
                setCallUI(currentCallType);
                incomingCallRef.answer(localStream);
                setupMediaConnection(incomingCallRef);
                incomingCallRef = null;
            }
        }

        function rejectCall() {
            ui.incomingModal.classList.add('hidden');
            if (incomingCallRef) {
                incomingCallRef.close();
                incomingCallRef = null;
            }
        }

        function setupMediaConnection(call) {
            mediaConnection = call;
            
            call.on('stream', (remoteStream) => {
                const videoEl = document.getElementById('remote-video');
                
                if (videoEl.srcObject !== remoteStream) {
                    videoEl.srcObject = remoteStream;
                    
                    videoEl.onloadedmetadata = () => {
                        videoEl.play().catch(e => console.log("Ошибка автовоспроизведения:", e));
                        document.getElementById('remote-video-loader').classList.add('hidden');
                    };
                }
            });

            call.on('close', () => endCallLocally());
            call.on('error', () => {
                showToast('Ошибка связи', 'error');
                endCallLocally();
            });
        }

        function endCall() {
            if (mediaConnection) {
                mediaConnection.close();
            }
            endCallLocally();
        }

        function endCallLocally() {
            mediaConnection = null;
            const videoEl = document.getElementById('remote-video');
            videoEl.srcObject = null;
            videoEl.classList.add('hidden');
            
            ui.videoOverlay.classList.add('hidden');
            
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
                document.getElementById('local-video').srcObject = null;
            }
            currentCallType = null;
        }

        function updateMediaButtons() {
            const btnMic = document.getElementById('btn-mic');
            btnMic.className = `flex-1 p-3 rounded-xl text-white transition ${micEnabled ? 'bg-stone-800 hover:bg-stone-700' : 'bg-red-500 hover:bg-red-600'}`;
            btnMic.innerHTML = `<i class="fas ${micEnabled ? 'fa-microphone' : 'fa-microphone-slash'} text-lg"></i>`;

            const btnVideo = document.getElementById('btn-video');
            btnVideo.className = `flex-1 p-3 rounded-xl text-white transition ${videoEnabled ? 'bg-stone-800 hover:bg-stone-700' : 'bg-red-500 hover:bg-red-600'}`;
            btnVideo.innerHTML = `<i class="fas ${videoEnabled ? 'fa-video' : 'fa-video-slash'} text-lg"></i>`;
        }

        function toggleMic() {
            if(!localStream) return;
            micEnabled = !micEnabled;
            localStream.getAudioTracks().forEach(track => track.enabled = micEnabled);
            updateMediaButtons();
        }

        function toggleVideo() {
            if(!localStream || currentCallType === 'audio') return;
            videoEnabled = !videoEnabled;
            localStream.getVideoTracks().forEach(track => track.enabled = videoEnabled);
            updateMediaButtons();
        }

        function copyId() {
            const id = document.getElementById('my-id').value;
            if(id === 'Генерация...') return;
            navigator.clipboard.writeText(id).then(() => {
                showToast('Код скопирован!');
            }).catch(() => {
                const input = document.getElementById('my-id');
                input.select();
                document.execCommand('copy');
                showToast('Код скопирован!');
            });
        }

        ui.chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
        
        ui.chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('chat-form').dispatchEvent(new Event('submit'));
            }
        });

        window.onload = initApp;

    </script>
</body>
</html>
